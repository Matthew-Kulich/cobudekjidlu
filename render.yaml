databases:
  - name: cobudekjidlu-db
    plan: free
    databaseName: cobudekjidlu
    user: cobudekjidlu

services:
  - type: web
    name: cobudekjidlu-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/cobudekjidlu-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        fromDatabase:
          name: cobudekjidlu-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: cobudekjidlu-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cobudekjidlu-db
          property: password
      - key: FRONTEND_URL
        value: https://matthew-kulich.github.io
