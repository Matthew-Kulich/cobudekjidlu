spring:
  application:
    name: cobudekjidlu-backend
  sql:
    init:
      mode: always
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cobudekjidlu}
    username: ${DB_USERNAME:cobudekjidlu}
    password: ${DB_PASSWORD:cobudekjidlu}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:5173}

