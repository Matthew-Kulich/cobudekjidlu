services:
  postgres:
    image: postgres:17
    container_name: cojist-postgres
    environment:
      POSTGRES_DB: cojist
      POSTGRES_USER: cojist
      POSTGRES_PASSWORD: cojist
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
